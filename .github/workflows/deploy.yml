name: Deploy Frontend to EKS
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read
env:
  AWS_REGION: us-east-2
  ECR_REPO: 900889879753.dkr.ecr.us-east-2.amazonaws.com/pw-ims-frontend
  EKS_CLUSTER: pw-ims-cluster-eks
  DEPLOYMENT: pw-ims-frontend
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO
      - name: Build, tag, push image
        run: |
          docker build -t pw-ims-frontend .
          docker tag pw-ims-frontend:latest $ECR_REPO:latest
          docker push $ECR_REPO:latest
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
      - name: Rollout restart
        run: kubectl rollout restart deployment/$DEPLOYMENT
